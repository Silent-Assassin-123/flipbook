<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ardor | Class 9B</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <span class="eyebrow">The Digital Edition</span>
            <h1>ARDOR</h1>
            <span class="class-credit">by class 9B</span>
        </header>

        <div class="share-card" id="share-card">
            <p>Share this publication</p>
            <div class="share-input-group">
                <input type="text" id="share-url" readonly>
                <button id="copy-btn" class="secondary-btn">Copy</button>
            </div>
        </div>

        <div class="upload-card" id="upload-card">
            <div class="upload-content">
                <h2>Upload Manuscript</h2>
                <p>Select a PDF document to generate the interactive editorial interface.</p>
                <button class="primary-btn" id="upload-btn">Browse Files</button>
                <input type="file" id="file-input" accept="application/pdf">
                <div class="loading-state" id="loading-state">
                    <div class="spinner"></div>
                    <span>Initializing Interface...</span>
                </div>
            </div>
        </div>

        <div id="book-wrapper" class="book-wrapper">
            <div class="flip-book" id="flip-book"></div>
        </div>
    </div>

    <div class="fixed-nav" id="fixed-nav">
        <button id="prev-btn" class="nav-btn"><i data-lucide="chevron-left"></i></button>
        <button id="play-toggle-btn" class="nav-btn"><i data-lucide="play"></i></button>
        <span id="page-counter">Page 1</span>
        <button id="next-btn" class="nav-btn"><i data-lucide="chevron-right"></i></button>
    </div>

    <script src="app.js"></script>
</body>
</html>
