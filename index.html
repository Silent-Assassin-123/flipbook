<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interactive Flipbook Viewer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/page-flip/dist/js/page-flip.browser.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Document Viewer</h1>
        </header>

        <div class="share-card" id="share-card">
            <p>Share this flipbook:</p>
            <div class="share-input-group">
                <input type="text" id="share-url" readonly>
                <button id="copy-btn" class="secondary-btn">Copy</button>
            </div>
        </div>

        <div class="upload-card" id="upload-card">
            <div class="upload-content">
                <h2>Upload your Document</h2>
                <p>Select a PDF to generate an interactive 3D flipbook.</p>
                <button class="primary-btn" id="upload-btn">Browse Files</button>
                <input type="file" id="file-input" accept="application/pdf">
                <div class="loading-state" id="loading-state">
                    <div class="spinner"></div>
                    <span>Processing document...</span>
                </div>
            </div>
        </div>

        <div id="book-wrapper" class="book-wrapper">
            <div class="flip-book" id="flip-book"></div>
        </div>

        <div class="mobile-nav" id="mobile-nav">
            <button id="prev-btn" class="nav-btn">← Prev</button>
            <span id="page-counter">Page 1</span>
            <button id="next-btn" class="nav-btn">Next →</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
